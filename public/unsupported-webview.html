<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; style-src 'unsafe-inline'; base-uri 'none'; form-action 'none'"
    />
    <meta name="color-scheme" content="light" />
    <title>Nutrio update required</title>
    <style>
      :root {
        color: #020617;
        background: #f6f8fb;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * { box-sizing: border-box; }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 420px);
        padding: 28px 24px;
        border: 1px solid #dbe4ef;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 18px 45px rgba(15, 23, 42, 0.1);
        text-align: center;
      }

      .mark {
        width: 56px;
        height: 56px;
        margin: 0 auto 20px;
        display: grid;
        place-items: center;
        border-radius: 50%;
        color: #047857;
        background: #dff9ef;
        font-size: 28px;
        font-weight: 800;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 24px;
        line-height: 1.25;
      }

      p {
        margin: 0;
        color: #64748b;
        font-size: 15px;
        line-height: 1.65;
      }

      .ar {
        margin-top: 18px;
        padding-top: 18px;
        border-top: 1px solid #e2e8f0;
      }

      a {
        min-height: 48px;
        margin-top: 24px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 22px;
        border-radius: 8px;
        color: #ffffff;
        background: #020617;
        font-size: 15px;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true">N</div>
      <h1>Security update required</h1>
      <p>
        Nutrio cannot start safely with this version of Android System WebView.
        Update WebView, then close and reopen the app.
      </p>
      <p class="ar" lang="ar" dir="rtl">
        &#1610;&#1580;&#1576; &#1578;&#1581;&#1583;&#1610;&#1579; Android System WebView
        &#1604;&#1578;&#1588;&#1594;&#1610;&#1604; Nutrio &#1576;&#1571;&#1605;&#1575;&#1606;.
        &#1576;&#1593;&#1583; &#1575;&#1604;&#1578;&#1581;&#1583;&#1610;&#1579;&#1548; &#1571;&#1594;&#1604;&#1602;
        &#1575;&#1604;&#1578;&#1591;&#1576;&#1610;&#1602; &#1608;&#1575;&#1601;&#1578;&#1581;&#1607; &#1605;&#1585;&#1577; &#1571;&#1582;&#1585;&#1609;.
      </p>
      <a
        href="https://play.google.com/store/apps/details?id=com.google.android.webview"
        target="_blank"
        rel="noopener noreferrer"
      >
        Update Android System WebView
      </a>
    </main>
  </body>
</html>
