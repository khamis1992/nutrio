/**
 * P1-007: Accessibility Improvements
 * WCAG 2.1 AA Compliance Styles
 */
/* ===== Focus Indicators ===== */
/* Visible focus indicators for keyboard navigation */
:focus-visible {
  outline: 2px solid hsl(var(--primary));
  outline-offset: 2px;
}
/* Remove default outline when focus-visible is supported */
:focus:not(:focus-visible) {
  outline: none;
}
/* ===== Minimum Touch Targets (44px) ===== */
/* Ensure all interactive elements meet 44px minimum size */
button,
[role="button"],
a,
input,
select,
textarea,
[tabindex]:not([tabindex="-1"]) {
  min-height: 44px;
  min-width: 44px;
}
/* Smaller touch targets allowed for icon-only buttons if properly sized */
.icon-button {
  min-height: 44px;
  min-width: 44px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
/* ===== Skip Link ===== */
/* Skip to main content link for keyboard users */
.skip-link {
  position: absolute;
  top: -40px;
  left: 0;
  background: hsl(var(--primary));
  color: hsl(var(--primary-foreground));
  padding: 8px 16px;
  z-index: 100;
  transition: top 0.3s;
}
.skip-link:focus {
  top: 0;
}
/* ===== Screen Reader Only ===== */
/* Visually hidden but accessible to screen readers */
.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border-width: 0;
}
/* ===== Reduced Motion ===== */
/* Respect user's motion preferences */
@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
    scroll-behavior: auto !important;
  }
}
/* ===== High Contrast Mode Support ===== */
@media (prefers-contrast: high) {
  :root {
    --primary: 142 80% 35%;
    --warning: 38 100% 45%;
    --destructive: 0 100% 45%;
  }

  /* Enhance borders for high contrast */
  .border,
  [class*="border"] {
    border-width: 2px !important;
  }

  /* Ensure text is clearly readable */
  .text-muted-foreground {
    color: hsl(150 10% 30%);
  }
}

/* Amber/Warning color contrast fixes */

/* Visual indicators for ARIA states */
