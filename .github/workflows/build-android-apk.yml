name: Build Android APK

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

env:
  NODE_VERSION: '22'
  JAVA_VERSION: '21'

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Update Capacitor Android project
        run: npx @capacitor/cli sync android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Debug APK
        if: github.event.inputs.build_type != 'release' || github.event.inputs.build_type == ''
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Build Release APK
        if: github.event.inputs.build_type == 'release'
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Publish Debug APK as GitHub Release
        if: github.event.inputs.build_type != 'release' || github.event.inputs.build_type == ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-debug-${{ github.sha }}
          name: "Debug APK – ${{ github.sha }}"
          body: "Auto-generated debug APK from commit ${{ github.sha }} on branch ${{ github.ref_name }}"
          prerelease: true
          files: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Publish Release APK as GitHub Release
        if: github.event.inputs.build_type == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-release-${{ github.sha }}
          name: "Release APK – ${{ github.sha }}"
          body: "Auto-generated release APK from commit ${{ github.sha }} on branch ${{ github.ref_name }}"
          prerelease: false
          files: android/app/build/outputs/apk/release/app-release.apk

      - name: Get APK info
        run: |
          if [ "${{ github.event.inputs.build_type }}" == "release" ]; then
            APK_PATH="android/app/build/outputs/apk/release/app-release.apk"
            APK_NAME="nutrio-fuel-release.apk"
          else
            APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
            APK_NAME="nutrio-fuel-debug.apk"
          fi

          if [ -f "$APK_PATH" ]; then
            APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
            echo "## APK Built Successfully!" >> $GITHUB_STEP_SUMMARY
            echo "- **File:** $APK_NAME" >> $GITHUB_STEP_SUMMARY
            echo "- **Size:** $APK_SIZE" >> $GITHUB_STEP_SUMMARY
            echo "- **Build Type:** ${{ github.event.inputs.build_type || 'debug' }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Download the APK from the GitHub Releases section of this repository." >> $GITHUB_STEP_SUMMARY
          fi
