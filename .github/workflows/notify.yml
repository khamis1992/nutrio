name: Notify on Build

on:
  workflow_run:
    workflows:
      - Build Android APK
      - CI/CD Pipeline
      - Deploy Edge Functions
      - Database Migration
    types:
      - completed
    branches:
      - main
      - develop

jobs:
  notify-telegram:
    name: Send Telegram Notification
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion != 'skipped' }}
    
    steps:
      - name: Send Telegram Message
        uses: appleboy/telegram-action@v0.1.1
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            🔔 *Build ${{ github.event.workflow_run.conclusion }}*
            
            *Workflow:* ${{ github.event.workflow_run.name }}
            *Branch:* ${{ github.event.workflow_run.head_branch }}
            *Commit:* `${{ github.event.workflow_run.head_sha }}`
            *Duration:* ${{ github.event.workflow_run.run_started_at }} → ${{ github.event.workflow_run.updated_at }}
            
            [View Run](${{ github.event.workflow_run.html_url }})

  notify-discord:
    name: Send Discord Notification
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion != 'skipped' }}
    
    steps:
      - name: Send Discord Webhook
        uses: appleboy/discord-action@v1.0.0
        with:
          webhook_id: ${{ secrets.DISCORD_WEBHOOK_ID }}
          webhook_token: ${{ secrets.DISCORD_WEBHOOK_TOKEN }}
          color: '${{ github.event.workflow_run.conclusion == "success" ? "00FF00" : "FF0000" }}'
          title: 'Build ${{ github.event.workflow_run.conclusion }}'
          description: |
            **Workflow:** ${{ github.event.workflow_run.name }}
            **Branch:** ${{ github.event.workflow_run.head_branch }}
          url: ${{ github.event.workflow_run.html_url }}
          username: GitHub Actions