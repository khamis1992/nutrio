name: Supply Chain Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '41 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supply-chain-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify locked dependencies and security policy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          cache: npm

      - name: Install verified Terraform CLI
        shell: bash
        run: |
          set -euo pipefail
          version='1.15.6'
          archive="terraform_${version}_linux_amd64.zip"
          curl --fail --silent --show-error --location --proto '=https' --tlsv1.2 \
            "https://releases.hashicorp.com/terraform/${version}/${archive}" \
            --output terraform.zip
          echo 'a7150d3b0e1b5c466ad42e8c499954a3c54645f8b56b385fa025d34f7e88faa9  terraform.zip' | sha256sum --check --strict
          unzip -q terraform.zip -d "$RUNNER_TEMP/terraform"
          echo "$RUNNER_TEMP/terraform" >> "$GITHUB_PATH"

      - name: Validate immutable evidence receiver
        working-directory: infra/security-evidence-receiver
        run: |
          terraform fmt -check -recursive
          terraform init -backend=false -input=false -lockfile=readonly
          terraform validate

      - name: Install locked packages without lifecycle scripts
        run: npm ci --ignore-scripts

      - name: Verify advisories and registry signatures
        run: |
          npm audit --audit-level=high
          npm audit signatures

      - name: Rebuild verified packages
        run: npm rebuild

      - name: Run repository security guardrails
        run: |
          npm run security:scan
          npm run test:run -- src/test/security-csp-supply-chain.test.ts
