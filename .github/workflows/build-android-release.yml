name: Build Android Release (APK + AAB)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_version:
        description: 'SemVer release version (for example 1.4.0)'
        required: true
        type: string

env:
  NODE_VERSION: '22'
  JAVA_VERSION: '21'

permissions:
  contents: read

jobs:
  build:
    name: Build Release APK & AAB
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: Mobile Signing
    concurrency:
      group: android-signing-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Verify trusted release commit
        shell: bash
        run: |
          if [[ "$GITHUB_REF_TYPE" == "branch" && "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "::error title=Untrusted release ref::Manual signed builds must run from main."
            exit 1
          fi

      - name: Derive immutable application version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="${{ inputs.release_version }}"
          fi
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error title=Invalid release version::Use a SemVer release version."
            exit 1
          fi
          if (( GITHUB_RUN_NUMBER < 1 || GITHUB_RUN_NUMBER > 2100000000 )); then
            echo "::error title=Invalid Android version code::GitHub run number is outside the Android range."
            exit 1
          fi
          echo "NUTRIO_VERSION_NAME=$version" >> "$GITHUB_ENV"
          echo "NUTRIO_VERSION_CODE=$GITHUB_RUN_NUMBER" >> "$GITHUB_ENV"
          git fetch --no-tags origin main
          if [[ "$GITHUB_SHA" != "$(git rev-parse origin/main)" ]]; then
            echo "::error title=Unapproved release commit::The signing target must be the current origin/main commit."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Verify dependencies and repository guardrails
        run: |
          npm audit --audit-level=high
          npm audit signatures
          npm rebuild
          npm run security:scan

      - name: Build web app
        run: VITE_APP_VERSION="$NUTRIO_VERSION_NAME" npm run build
        env:
          # Required - app will not connect to Supabase without these.
          # Configure in GitHub repository settings under Actions secrets.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          # Optional - app degrades gracefully when missing, but features
          # (maps, analytics, error tracking) will be unavailable.
          VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN || '' }}
          VITE_GOOGLE_FIT_CLIENT_ID: ${{ secrets.VITE_GOOGLE_FIT_CLIENT_ID || '' }}
          VITE_APP_URL: ${{ secrets.VITE_APP_URL || '' }}
          VITE_ENABLE_PAYMENT_SIMULATION: 'false'

      - name: Update Capacitor Android project
        run: npx --no-install cap sync android

      - name: Setup Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Verify Gradle wrapper integrity
        shell: bash
        run: |
          echo "7d3a4ac4de1c32b59bc6a4eb8ecb8e612ccd0cf1ae1e99f66902da64df296172  android/gradle/wrapper/gradle-wrapper.jar" | sha256sum --check --strict

      - name: Require attested Gradle publisher signatures
        shell: bash
        run: |
          set -euo pipefail
          metadata="android/gradle/verification-metadata.xml"
          keyring="android/gradle/verification-keyring.keys"
          test -s "$metadata"
          test -s "$keyring"
          if grep -Fq '<verify-signatures>false</verify-signatures>' "$metadata"; then
            echo "::error title=Gradle provenance not attested::Regenerate dependency verification metadata on a clean isolated runner, review every checksum, and configure trusted publisher keys before a signed Android release."
            exit 1
          fi
          grep -Fq '<verify-signatures>true</verify-signatures>' "$metadata"
          grep -Eq '<trusted-key([ >])' "$metadata"
          grep -Fq -- '-----BEGIN PGP PUBLIC KEY BLOCK-----' "$keyring"

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Cache Gradle packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$KEYSTORE_BASE64"
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"

      - name: Create keystore properties
        env:
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          test -n "$KEY_ALIAS"
          test -n "$KEY_PASSWORD"
          test -n "$STORE_PASSWORD"
          cat > android/keystore.properties << EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=$RUNNER_TEMP/release.keystore
          EOF

      - name: Build signed Release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --dependency-verification=strict

      - name: Build signed Release Bundle
        run: |
          cd android
          ./gradlew bundleRelease --no-daemon --dependency-verification=strict

      - name: Verify signed artifacts and create checksums
        shell: bash
        env:
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          set -euo pipefail

          mapfile -t APK_FILES < <(find android/app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' -print)
          mapfile -t AAB_FILES < <(find android/app/build/outputs/bundle/release -maxdepth 1 -type f -name '*.aab' -print)

          if [[ "${#APK_FILES[@]}" -ne 1 ]]; then
            echo "::error title=Invalid APK output::Expected exactly one release APK, found ${#APK_FILES[@]}."
            exit 1
          fi
          if [[ "${#AAB_FILES[@]}" -ne 1 ]]; then
            echo "::error title=Invalid AAB output::Expected exactly one release AAB, found ${#AAB_FILES[@]}."
            exit 1
          fi

          APK_PATH="${APK_FILES[0]}"
          AAB_PATH="${AAB_FILES[0]}"
          APKSIGNER_PATH="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner -print | sort -V | tail -n 1)"
          APKANALYZER_PATH="$(find "$ANDROID_HOME/cmdline-tools" -type f -name apkanalyzer -print | head -n 1)"

          if [[ -z "$APKSIGNER_PATH" || ! -x "$APKSIGNER_PATH" ]]; then
            echo "::error title=Missing verifier::Android SDK apksigner was not found."
            exit 1
          fi

          if [[ -z "$APKANALYZER_PATH" || ! -x "$APKANALYZER_PATH" ]]; then
            echo "::error title=Missing manifest verifier::Android SDK apkanalyzer was not found."
            exit 1
          fi
          test "$("$APKANALYZER_PATH" manifest version-name "$APK_PATH")" = "$NUTRIO_VERSION_NAME"
          test "$("$APKANALYZER_PATH" manifest version-code "$APK_PATH")" = "$NUTRIO_VERSION_CODE"

          EXPECTED_CERT_SHA256="$(
            keytool -exportcert -rfc \
              -alias "$KEY_ALIAS" \
              -keystore "$RUNNER_TEMP/release.keystore" \
              -storepass:env STORE_PASSWORD |
              openssl x509 -outform DER |
              sha256sum |
              awk '{print tolower($1)}'
          )"

          APK_VERIFY_OUTPUT="$RUNNER_TEMP/apksigner-verify.txt"
          "$APKSIGNER_PATH" verify --verbose --print-certs "$APK_PATH" | tee "$APK_VERIFY_OUTPUT"
          APK_CERT_SHA256="$(awk -F': ' '/Signer #1 certificate SHA-256 digest/ {print tolower($2); exit}' "$APK_VERIFY_OUTPUT")"

          AAB_VERIFY_OUTPUT="$RUNNER_TEMP/jarsigner-verify.txt"
          jarsigner -verify -verbose -certs "$AAB_PATH" | tee "$AAB_VERIFY_OUTPUT"
          if ! grep -Fq 'jar verified.' "$AAB_VERIFY_OUTPUT"; then
            echo "::error title=Invalid AAB signature::jarsigner did not verify the release bundle."
            exit 1
          fi
          AAB_CERT_SHA256="$(
            keytool -printcert -rfc -jarfile "$AAB_PATH" |
              openssl x509 -outform DER |
              sha256sum |
              awk '{print tolower($1)}'
          )"

          if [[ -z "$EXPECTED_CERT_SHA256" || "$APK_CERT_SHA256" != "$EXPECTED_CERT_SHA256" ]]; then
            echo "::error title=APK signer mismatch::The APK is not signed by the protected release key."
            exit 1
          fi
          if [[ -z "$AAB_CERT_SHA256" || "$AAB_CERT_SHA256" != "$EXPECTED_CERT_SHA256" ]]; then
            echo "::error title=AAB signer mismatch::The AAB is not signed by the protected release key."
            exit 1
          fi

          CHECKSUM_DIR="android/app/build/outputs/release-checksums"
          mkdir -p "$CHECKSUM_DIR"
          {
            printf '%s  %s\n' "$(sha256sum "$APK_PATH" | awk '{print $1}')" "$(basename "$APK_PATH")"
            printf '%s  %s\n' "$(sha256sum "$AAB_PATH" | awk '{print $1}')" "$(basename "$AAB_PATH")"
          } > "$CHECKSUM_DIR/SHA256SUMS"
          {
            echo "commit=$GITHUB_SHA"
            echo "version_name=$NUTRIO_VERSION_NAME"
            echo "version_code=$NUTRIO_VERSION_CODE"
            echo "certificate_sha256=$EXPECTED_CERT_SHA256"
          } > "$CHECKSUM_DIR/SIGNING-MANIFEST.txt"

      - name: Remove temporary signing assets
        if: always()
        run: |
          rm -f "$RUNNER_TEMP/release.keystore"
          rm -f android/keystore.properties

      - name: Upload APK artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nutrio-fuel-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

      - name: Upload AAB artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nutrio-fuel-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

      - name: Upload release checksums
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nutrio-fuel-release-checksums
          path: android/app/build/outputs/release-checksums/*
          if-no-files-found: error
          retention-days: 14

      - name: Get version from tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release Summary
        run: |
          echo "## Android release built and verified" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Information" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.get_version.outputs.VERSION || 'Development' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- **APK:** Download from artifacts below (for direct installation)" >> $GITHUB_STEP_SUMMARY
          echo "- **AAB:** Download from artifacts below (for Play Store upload)" >> $GITHUB_STEP_SUMMARY
          echo "- **Checksums:** Verify against the SHA256SUMS artifact before distribution" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Installation" >> $GITHUB_STEP_SUMMARY
          echo "1. Download the APK file" >> $GITHUB_STEP_SUMMARY
          echo "2. Transfer to your Android device" >> $GITHUB_STEP_SUMMARY
          echo "3. Enable 'Install from unknown sources'" >> $GITHUB_STEP_SUMMARY
          echo "4. Open the APK file to install" >> $GITHUB_STEP_SUMMARY
