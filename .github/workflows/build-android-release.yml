name: Build Android Release (APK + AAB)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  JAVA_VERSION: '17'

jobs:
  build:
    name: Build Release APK & AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Update Capacitor Android project
        run: npx @capacitor/cli sync android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Decode keystore
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore

      - name: Create keystore properties
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          cat > android/app/keystore.properties << EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=release.keystore
          EOF

      - name: Build Release APK (Unsigned)
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Build Release Bundle (AAB) (Unsigned)
        run: |
          cd android
          ./gradlew bundleRelease --no-daemon

      - name: Build Release APK (Signed)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Build Release Bundle (AAB) (Signed)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          cd android
          ./gradlew bundleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nutrio-fuel-release-apk
          path: |
            android/app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: nutrio-fuel-release-aab
          path: |
            android/app/build/outputs/bundle/release/*.aab
          retention-days: 90

      - name: Get version from tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release Summary
        run: |
          echo "## 📱 Android Release Built Successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Information" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.get_version.outputs.VERSION || 'Development' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- **APK:** Download from artifacts below (for direct installation)" >> $GITHUB_STEP_SUMMARY
          echo "- **AAB:** Download from artifacts below (for Play Store upload)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Installation" >> $GITHUB_STEP_SUMMARY
          echo "1. Download the APK file" >> $GITHUB_STEP_SUMMARY
          echo "2. Transfer to your Android device" >> $GITHUB_STEP_SUMMARY
          echo "3. Enable 'Install from unknown sources'" >> $GITHUB_STEP_SUMMARY
          echo "4. Open the APK file to install" >> $GITHUB_STEP_SUMMARY
