name: Lighthouse Performance

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to audit'
        required: true
        type: string
      device:
        description: 'Device type'
        required: true
        default: 'desktop'
        type: choice
        options:
          - desktop
          - mobile
          - both

env:
  NODE_VERSION: '22'
  LIGHTHOUSE_VERSION: '13.4.0'

permissions:
  contents: read

jobs:
  audit:
    name: Lighthouse Audit on ${{ github.event.inputs.device }}
    runs-on: ubuntu-latest
    env:
      AUDIT_URL: ${{ inputs.url }}
      AUDIT_DEVICE: ${{ inputs.device }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Lighthouse
        run: npm install --no-save "lighthouse@${LIGHTHOUSE_VERSION}"

      - name: Validate audit target
        run: >-
          node -e "const u=new URL(process.env.AUDIT_URL); const h=u.hostname.toLowerCase();
          if(u.protocol!=='https:' || u.username || u.password || (u.port && u.port!=='443') ||
          (h!=='nutrio.me' && h!=='www.nutrio.me' && !h.endsWith('.nutrio.me')))
          throw new Error('Only HTTPS Nutrio-owned hosts on port 443 may be audited');"

      - name: Run Lighthouse Desktop
        if: github.event.inputs.device == 'desktop' || github.event.inputs.device == 'both'
        run: |
          npx lighthouse "$AUDIT_URL" \
            --preset=desktop \
            --output=json \
            --output-path=lighthouse-desktop.json \
            --chrome-path=$(which google-chrome-stable) \
            --chrome-flags="--headless=new --no-sandbox --disable-dev-shm-usage --disable-gpu"

      - name: Run Lighthouse Mobile
        if: github.event.inputs.device == 'mobile' || github.event.inputs.device == 'both'
        run: |
          npx lighthouse "$AUDIT_URL" \
            --output=json \
            --output-path=lighthouse-mobile.json \
            --chrome-path=$(which google-chrome-stable) \
            --chrome-flags="--headless=new --no-sandbox --disable-dev-shm-usage --disable-gpu"

      - name: Parse Desktop Results
        if: github.event.inputs.device == 'desktop' || github.event.inputs.device == 'both'
        id: desktop-results
        run: |
          cat lighthouse-desktop.json | jq -r '
            "## Desktop Lighthouse Results\n\n" +
            "| Category | Score |\n" +
            "|----------|-------|\n" +
            "| Performance | " + (.categories.performance.score * 100 | tostring) + "/100 |\n" +
            "| Accessibility | " + (.categories.accessibility.score * 100 | tostring) + "/100 |\n" +
            "| Best Practices | " + (.categories."best-practices".score * 100 | tostring) + "/100 |\n" +
            "| SEO | " + (.categories.seo.score * 100 | tostring) + "/100 |\n\n" +
            "### Metrics\n" +
            "| Metric | Value |\n" +
            "|-------|-------|\n" +
            "| First Contentful Paint | " + (.audits."first-contentful-paint".displayValue) + " |\n" +
            "| Largest Contentful Paint | " + (.audits."largest-contentful-paint".displayValue) + " |\n" +
            "| Total Blocking Time | " + (.audits."total-blocking-time".displayValue) + " |\n" +
            "| Cumulative Layout Shift | " + (.audits."cumulative-layout-shift".displayValue) + " |\n" +
            "| Speed Index | " + (.audits."speed-index".displayValue) + " |"
          ' >> $GITHUB_STEP_SUMMARY

      - name: Parse Mobile Results
        if: github.event.inputs.device == 'mobile' || github.event.inputs.device == 'both'
        id: mobile-results
        run: |
          cat lighthouse-mobile.json | jq -r '
            "## Mobile Lighthouse Results\n\n" +
            "| Category | Score |\n" +
            "|----------|-------|\n" +
            "| Performance | " + (.categories.performance.score * 100 | tostring) + "/100 |\n" +
            "| Accessibility | " + (.categories.accessibility.score * 100 | tostring) + "/100 |\n" +
            "| Best Practices | " + (.categories."best-practices".score * 100 | tostring) + "/100 |\n" +
            "| SEO | " + (.categories.seo.score * 100 | tostring) + "/100 |\n\n" +
            "### Metrics\n" +
            "| Metric | Value |\n" +
            "|-------|-------|\n" +
            "| First Contentful Paint | " + (.audits."first-contentful-paint".displayValue) + " |\n" +
            "| Largest Contentful Paint | " + (.audits."largest-contentful-paint".displayValue) + " |\n" +
            "| Total Blocking Time | " + (.audits."total-blocking-time".displayValue) + " |\n" +
            "| Cumulative Layout Shift | " + (.audits."cumulative-layout-shift".displayValue) + " |\n" +
            "| Speed Index | " + (.audits."speed-index".displayValue) + " |"
          ' >> $GITHUB_STEP_SUMMARY

      - name: Upload Artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: lighthouse-results
          path: |
            lighthouse-*.json
          retention-days: 7

      - name: Check Thresholds
        env:
          DEVICE: ${{ inputs.device }}
        run: |
          THRESHOLD=50

          check_score() {
            local FILE=$1
            local LABEL=$2
            local SCORE=$(cat "$FILE" | jq -r '.categories.performance.score * 100' | cut -d'.' -f1)
            echo "$LABEL Performance Score: $SCORE"
            if [ "$SCORE" -lt "$THRESHOLD" ]; then
              echo "⚠️ $LABEL performance score below threshold ($THRESHOLD)"
            else
              echo "✅ $LABEL performance score meets threshold"
            fi
          }

          if [ "$DEVICE" == "desktop" ] || [ "$DEVICE" == "both" ]; then
            check_score lighthouse-desktop.json "Desktop"
          fi
          if [ "$DEVICE" == "mobile" ] || [ "$DEVICE" == "both" ]; then
            check_score lighthouse-mobile.json "Mobile"
          fi
