name: Build iOS IPA

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      build_type:
        description: Build type
        required: true
        default: debug
        type: choice
        options:
          - debug
          - release
      release_version:
        description: SemVer release version (required for release)
        required: false
        type: string

env:
  NODE_VERSION: '22'
  CAPACITOR_SWIFT_VERSION: '8.0.0'
  CAPACITOR_SWIFT_REVISION: '596259033e94829dffc552a40e7129262122995e'

permissions:
  contents: read

jobs:
  debug:
    name: Build iOS Debug
    if: github.event_name != 'workflow_dispatch' || inputs.build_type != 'release'
    runs-on: macos-latest
    timeout-minutes: 40

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Verify dependencies and repository guardrails
        run: |
          npm audit --audit-level=high
          npm audit signatures
          npm rebuild
          npm run security:scan

      - name: Build web app
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Sync Capacitor iOS project
        run: npx --no-install cap sync ios

      - name: Verify locked Swift package revision
        shell: bash
        run: |
          set -euo pipefail
          lock="ios/App/App.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved"
          test -f "$lock"
          grep -F "\"location\" : \"https://github.com/ionic-team/capacitor-swift-pm.git\"" "$lock"
          grep -F "\"revision\" : \"${CAPACITOR_SWIFT_REVISION}\"" "$lock"
          grep -F "\"version\" : \"${CAPACITOR_SWIFT_VERSION}\"" "$lock"

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build iOS Debug simulator app
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath ios/DerivedData \
            -disableAutomaticPackageResolution \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Build summary
        run: |
          echo "## iOS debug build complete" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`$GITHUB_SHA\`" >> "$GITHUB_STEP_SUMMARY"

  release:
    name: Build signed iOS release
    if: >-
      github.event_name == 'workflow_dispatch' &&
      inputs.build_type == 'release' &&
      github.ref == 'refs/heads/main'
    runs-on: macos-latest
    timeout-minutes: 60
    environment: Mobile Signing
    concurrency:
      group: ios-signing-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout trusted release commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Verify trusted release commit
        shell: bash
        run: |
          git fetch --no-tags origin main
          if [[ "$GITHUB_SHA" != "$(git rev-parse origin/main)" ]]; then
            echo "::error title=Unapproved release commit::The signing target must be the current origin/main commit."
            exit 1
          fi

      - name: Validate release version
        shell: bash
        run: |
          set -euo pipefail
          version="${{ inputs.release_version }}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error title=Invalid release version::A SemVer release version is required."
            exit 1
          fi
          echo "NUTRIO_VERSION_NAME=$version" >> "$GITHUB_ENV"
          echo "NUTRIO_VERSION_CODE=$GITHUB_RUN_NUMBER" >> "$GITHUB_ENV"

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Verify dependencies and repository guardrails
        run: |
          npm audit --audit-level=high
          npm audit signatures
          npm rebuild
          npm run security:scan

      - name: Build web app
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Sync Capacitor iOS project
        run: npx --no-install cap sync ios

      - name: Verify locked Swift package revision
        shell: bash
        run: |
          set -euo pipefail
          lock="ios/App/App.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved"
          test -f "$lock"
          grep -F "\"location\" : \"https://github.com/ionic-team/capacitor-swift-pm.git\"" "$lock"
          grep -F "\"revision\" : \"${CAPACITOR_SWIFT_REVISION}\"" "$lock"
          grep -F "\"version\" : \"${CAPACITOR_SWIFT_VERSION}\"" "$lock"

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Revalidate release commit before signing
        shell: bash
        run: |
          git fetch --no-tags origin main
          if [[ "$GITHUB_SHA" != "$(git rev-parse origin/main)" ]]; then
            echo "::error title=Stale release commit::origin/main changed before signing assets were opened. Start a new release from current main."
            exit 1
          fi

      - name: Import Apple signing assets
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          test -n "$CERTIFICATE_BASE64"
          test -n "$CERTIFICATE_PASSWORD"
          test -n "$PROFILE_BASE64"

          CERTIFICATE_PATH="$RUNNER_TEMP/distribution.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/nutrio-build.keychain-db"
          PROFILE_PATH="$HOME/Library/MobileDevice/Provisioning Profiles/nutrio.mobileprovision"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 32)"

          printf '%s' "$CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          mkdir -p "$(dirname "$PROFILE_PATH")"
          printf '%s' "$PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -t cert -f pkcs12
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

      - name: Archive signed iOS release
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          test -n "$TEAM_ID"
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath ios/App/build/Nutrio.xcarchive \
            -disableAutomaticPackageResolution \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            MARKETING_VERSION="$NUTRIO_VERSION_NAME" \
            CURRENT_PROJECT_VERSION="$NUTRIO_VERSION_CODE" \
            archive

      - name: Export signed IPA
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          EXPORT_OPTIONS="$RUNNER_TEMP/ExportOptions.plist"
          /usr/libexec/PlistBuddy -c "Add :method string app-store-connect" "$EXPORT_OPTIONS"
          /usr/libexec/PlistBuddy -c "Add :teamID string $TEAM_ID" "$EXPORT_OPTIONS"
          /usr/libexec/PlistBuddy -c "Add :compileBitcode bool false" "$EXPORT_OPTIONS"

          xcodebuild -exportArchive \
            -archivePath ios/App/build/Nutrio.xcarchive \
            -exportOptionsPlist "$EXPORT_OPTIONS" \
            -exportPath ios/App/build/export

      - name: Verify signed IPA and create checksums
        shell: bash
        env:
          EXPECTED_CERT_SHA256: ${{ secrets.IOS_DISTRIBUTION_CERT_SHA256 }}
        run: |
          set -euo pipefail
          test -n "$EXPECTED_CERT_SHA256"
          shopt -s nullglob
          IPA_FILES=(ios/App/build/export/*.ipa)
          if [[ "${#IPA_FILES[@]}" -ne 1 ]]; then
            echo "::error title=Invalid IPA output::Expected exactly one IPA, found ${#IPA_FILES[@]}."
            exit 1
          fi
          IPA_PATH="${IPA_FILES[0]}"
          VERIFY_DIR="$RUNNER_TEMP/ipa-verify"
          ditto -x -k "$IPA_PATH" "$VERIFY_DIR"
          APP_DIRS=("$VERIFY_DIR"/Payload/*.app)
          test "${#APP_DIRS[@]}" -eq 1
          APP_PATH="${APP_DIRS[0]}"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          codesign -d --extract-certificates "$APP_PATH"
          ACTUAL_CERT_SHA256="$(shasum -a 256 codesign0 | awk '{print tolower($1)}')"
          EXPECTED_CERT_SHA256="$(printf '%s' "$EXPECTED_CERT_SHA256" | tr '[:upper:]' '[:lower:]' | tr -d ':')"
          test "$ACTUAL_CERT_SHA256" = "$EXPECTED_CERT_SHA256"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$APP_PATH/Info.plist")" = "$NUTRIO_VERSION_NAME"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$APP_PATH/Info.plist")" = "$NUTRIO_VERSION_CODE"
          CHECKSUM_DIR="ios/App/build/release-checksums"
          mkdir -p "$CHECKSUM_DIR"
          printf '%s  %s\n' "$(shasum -a 256 "$IPA_PATH" | awk '{print $1}')" "$(basename "$IPA_PATH")" > "$CHECKSUM_DIR/SHA256SUMS"
          {
            echo "commit=$GITHUB_SHA"
            echo "version_name=$NUTRIO_VERSION_NAME"
            echo "version_code=$NUTRIO_VERSION_CODE"
            echo "certificate_sha256=$EXPECTED_CERT_SHA256"
          } > "$CHECKSUM_DIR/SIGNING-MANIFEST.txt"
          rm -f codesign0 codesign1 codesign2

      - name: Upload Release IPA
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nutrio-ios-release
          path: ios/App/build/export/*.ipa
          if-no-files-found: error
          retention-days: 14

      - name: Upload iOS release checksums
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nutrio-ios-release-checksums
          path: ios/App/build/release-checksums/*
          if-no-files-found: error
          retention-days: 14

      - name: Remove temporary signing assets
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/nutrio-build.keychain-db" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/distribution.p12"
          rm -f "$RUNNER_TEMP/ExportOptions.plist"
          rm -f "$HOME/Library/MobileDevice/Provisioning Profiles/nutrio.mobileprovision"

      - name: Build summary
        run: |
          echo "## Signed iOS release complete" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`$GITHUB_SHA\`" >> "$GITHUB_STEP_SUMMARY"

  publish:
    name: Publish iOS IPA
    if: >-
      github.event_name == 'workflow_dispatch' &&
      inputs.build_type == 'release' &&
      github.ref == 'refs/heads/main'
    needs: release
    runs-on: macos-latest
    environment: Mobile Signing
    permissions:
      contents: write

    steps:
      - name: Download signed IPA
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: nutrio-ios-release
          path: release-files

      - name: Download IPA checksums
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: nutrio-ios-release-checksums
          path: release-files

      - name: Reverify artifact before publication
        shell: bash
        env:
          EXPECTED_CERT_SHA256: ${{ secrets.IOS_DISTRIBUTION_CERT_SHA256 }}
        run: |
          set -euo pipefail
          cd release-files
          shasum -a 256 --check SHA256SUMS
          shopt -s nullglob
          IPA_FILES=(./*.ipa)
          test "${#IPA_FILES[@]}" -eq 1
          VERIFY_DIR="$RUNNER_TEMP/ipa-publish-verify"
          ditto -x -k "${IPA_FILES[0]}" "$VERIFY_DIR"
          APP_DIRS=("$VERIFY_DIR"/Payload/*.app)
          test "${#APP_DIRS[@]}" -eq 1
          APP_PATH="${APP_DIRS[0]}"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          codesign -d --extract-certificates "$APP_PATH"
          actual="$(shasum -a 256 codesign0 | awk '{print tolower($1)}')"
          expected="$(printf '%s' "$EXPECTED_CERT_SHA256" | tr '[:upper:]' '[:lower:]' | tr -d ':')"
          test "$actual" = "$expected"
          rm -f codesign0 codesign1 codesign2

      - name: Publish IPA as GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ios-v${{ inputs.release_version }}-${{ github.run_number }}
          name: Nutrio iOS ${{ inputs.release_version }} (build ${{ github.run_number }})
          body: |
            Signed iOS release from a protected manual build.
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
          prerelease: false
          make_latest: false
          files: release-files/*.ipa
