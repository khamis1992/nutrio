name: Database Migration

on:
  workflow_dispatch:
    inputs:
      migration_file:
        description: 'Required release marker. All pending migrations are previewed/applied.'
        required: true
        type: string
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      dry_run:
        description: 'Dry run (preview only)'
        required: false
        type: boolean
        default: false
      deploy_edge_functions:
        description: 'Deploy Edge functions after migrations succeed'
        required: false
        type: boolean
        default: true

env:
  SUPABASE_CLI_VERSION: '2.109.1'
  SUPABASE_CLI_SHA256: '36d87b7fe6b4bcfe89ac47a4354e526cff22480224de426d7b370f6934556976'

permissions:
  contents: read

concurrency:
  group: database-migration-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  migrate:
    name: Run Migration on ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    permissions:
      contents: read
    env:
      MIGRATION_FILE: ${{ inputs.migration_file }}
      TARGET_ENVIRONMENT: ${{ inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.environment == 'production' && 'refs/heads/main' || github.sha }}

      - name: Require protected main for production
        if: inputs.environment == 'production'
        run: |
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "Production migrations must be dispatched from the protected main branch."
            exit 1
          fi
          git fetch --no-tags origin refs/heads/main:refs/remotes/origin/main
          test "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)"

      - name: Install checksum-verified Supabase CLI
        shell: bash
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/supabase_${SUPABASE_CLI_VERSION}_linux_amd64.tar.gz"
          install_dir="$RUNNER_TEMP/supabase-cli"
          curl --proto '=https' --tlsv1.2 --fail --location --silent --show-error \
            "https://github.com/supabase/cli/releases/download/v${SUPABASE_CLI_VERSION}/supabase_${SUPABASE_CLI_VERSION}_linux_amd64.tar.gz" \
            --output "$archive"
          echo "${SUPABASE_CLI_SHA256}  ${archive}" | sha256sum --check --strict
          mkdir -p "$install_dir"
          tar --extract --gzip --file "$archive" --directory "$install_dir" supabase
          chmod 0755 "$install_dir/supabase"
          actual_version=$("$install_dir/supabase" --version)
          test "$actual_version" = "$SUPABASE_CLI_VERSION"
          echo "$install_dir" >> "$GITHUB_PATH"

      - name: Verify migration file exists
        id: check_file
        run: |
          if [[ ! "$MIGRATION_FILE" =~ ^[0-9]{8,14}_[A-Za-z0-9_]+\.sql$ ]]; then
            echo "Migration file must be a base filename with a timestamp and .sql suffix."
            exit 1
          fi

          MIGRATION_PATH="supabase/migrations/$MIGRATION_FILE"
          if [ ! -f "$MIGRATION_PATH" ]; then
            echo "Migration file not found: $MIGRATION_PATH"
            exit 1
          fi

          git ls-files --error-unmatch "$MIGRATION_PATH" >/dev/null
          echo "exists=true" >> "$GITHUB_OUTPUT"
          echo "sha256=$(sha256sum "$MIGRATION_PATH" | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Preview Migration (Dry Run)
        if: github.event.inputs.dry_run == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          DB_URL_STAGING: ${{ secrets.SUPABASE_DB_URL_STAGING }}
          DB_URL_PRODUCTION: ${{ secrets.SUPABASE_DB_URL_PRODUCTION }}
        run: |
          if [ "$TARGET_ENVIRONMENT" = "production" ]; then
            DB_URL="$DB_URL_PRODUCTION"
          else
            DB_URL="$DB_URL_STAGING"
          fi
          test -n "$DB_URL"

          supabase db push --dry-run --db-url "$DB_URL"

          {
            echo "## Database dry run"
            echo "- Release marker: \`$MIGRATION_FILE\`"
            echo "- Marker SHA-256: \`${{ steps.check_file.outputs.sha256 }}\`"
            echo "- Environment: \`$TARGET_ENVIRONMENT\`"
            echo "- Scope: all pending migrations shown in the dry-run output"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Apply Migration
        if: github.event.inputs.dry_run != 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          DB_URL_STAGING: ${{ secrets.SUPABASE_DB_URL_STAGING }}
          DB_URL_PRODUCTION: ${{ secrets.SUPABASE_DB_URL_PRODUCTION }}
        run: |
          echo "Applying all pending migrations approved by marker: $MIGRATION_FILE"

          if [ "$TARGET_ENVIRONMENT" = "production" ]; then
            DB_URL="$DB_URL_PRODUCTION"
          else
            DB_URL="$DB_URL_STAGING"
          fi
          test -n "$DB_URL"

          supabase db push --db-url "$DB_URL"

      - name: Verify notification runtime contract after migration
        if: github.event.inputs.dry_run != 'true'
        env:
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_RUNTIME_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: |
          test -n "$SUPABASE_PROJECT_ID"
          test -n "$SUPABASE_RUNTIME_SECRET_KEY"

          auth_headers=(-H "apikey: ${SUPABASE_RUNTIME_SECRET_KEY}")
          if [[ "$SUPABASE_RUNTIME_SECRET_KEY" == eyJ* ]]; then
            auth_headers+=(-H "Authorization: Bearer ${SUPABASE_RUNTIME_SECRET_KEY}")
          fi

          runtime_version=$(curl --silent --show-error --fail \
            "https://${SUPABASE_PROJECT_ID}.supabase.co/rest/v1/rpc/notification_delivery_runtime_version" \
            -X POST \
            "${auth_headers[@]}" \
            -H "Content-Type: application/json" \
            --data '{}')

          if [ "$runtime_version" != '"20260717090000"' ]; then
            echo "Database migration completed but the notification runtime contract is not active."
            exit 1
          fi

      - name: Deploy Edge functions after database migration
        if: github.event.inputs.dry_run != 'true' && github.event.inputs.deploy_edge_functions == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          for dir in supabase/functions/*/; do
            function_name=$(basename "$dir")
            if [[ "$function_name" == _* ]]; then
              continue
            fi
            supabase functions deploy "$function_name" --project-ref "$SUPABASE_PROJECT_ID"
          done

      - name: Summary
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "## Dry Run Complete" >> "$GITHUB_STEP_SUMMARY"
            echo "No changes applied. Run again with Dry Run disabled to apply all pending migrations." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Pending Migrations Applied" >> "$GITHUB_STEP_SUMMARY"
            echo "- Release marker: \`$MIGRATION_FILE\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- Environment: \`$TARGET_ENVIRONMENT\`" >> "$GITHUB_STEP_SUMMARY"
          fi
