name: Deploy Edge Functions

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      confirm_database_ready:
        description: 'I confirm all required database migrations are already applied'
        required: true
        default: false
        type: boolean
  schedule:
    # GitHub-hosted cron is the repo-managed worker runner. Each worker uses a
    # dedicated production-environment secret; no provider secret lives in SQL.
    - cron: '*/5 * * * *'
    - cron: '17 * * * *'
    - cron: '31 * * * *'
    - cron: '23 2 * * *'
    - cron: '13 3 * * 0'

concurrency:
  group: edge-runtime-${{ github.event_name }}-${{ github.event.inputs.environment || github.event.schedule || 'production' }}
  cancel-in-progress: false

env:
  SUPABASE_CLI_VERSION: '2.109.1'
  SUPABASE_CLI_SHA256: '36d87b7fe6b4bcfe89ac47a4354e526cff22480224de426d7b370f6934556976'

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch'
    name: Deploy Edge Functions to ${{ github.event.inputs.environment || 'staging' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.environment == 'production' && 'refs/heads/main' || github.sha }}

      - name: Require protected main for production
        if: inputs.environment == 'production'
        run: |
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "Production Edge deployments must be dispatched from the protected main branch."
            exit 1
          fi
          git fetch --no-tags origin refs/heads/main:refs/remotes/origin/main
          test "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)"

      - name: Install checksum-verified Supabase CLI
        shell: bash
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/supabase_${SUPABASE_CLI_VERSION}_linux_amd64.tar.gz"
          install_dir="$RUNNER_TEMP/supabase-cli"
          curl --proto '=https' --tlsv1.2 --fail --location --silent --show-error \
            "https://github.com/supabase/cli/releases/download/v${SUPABASE_CLI_VERSION}/supabase_${SUPABASE_CLI_VERSION}_linux_amd64.tar.gz" \
            --output "$archive"
          echo "${SUPABASE_CLI_SHA256}  ${archive}" | sha256sum --check --strict
          mkdir -p "$install_dir"
          tar --extract --gzip --file "$archive" --directory "$install_dir" supabase
          chmod 0755 "$install_dir/supabase"
          actual_version=$("$install_dir/supabase" --version)
          test "$actual_version" = "$SUPABASE_CLI_VERSION"
          echo "$install_dir" >> "$GITHUB_PATH"

      - name: Require database readiness confirmation
        if: github.event.inputs.confirm_database_ready != 'true'
        run: |
          echo "Database readiness must be confirmed before Edge functions can be deployed."
          exit 1

      - name: Verify Edge runtime database contracts
        env:
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_RUNTIME_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: |
          test -n "$SUPABASE_PROJECT_ID"
          test -n "$SUPABASE_RUNTIME_SECRET_KEY"

          auth_headers=(-H "apikey: ${SUPABASE_RUNTIME_SECRET_KEY}")
          if [[ "$SUPABASE_RUNTIME_SECRET_KEY" == eyJ* ]]; then
            auth_headers+=(-H "Authorization: Bearer ${SUPABASE_RUNTIME_SECRET_KEY}")
          fi

          runtime_version=$(curl --silent --show-error --fail \
            "https://${SUPABASE_PROJECT_ID}.supabase.co/rest/v1/rpc/notification_delivery_runtime_version" \
            -X POST \
            "${auth_headers[@]}" \
            -H "Content-Type: application/json" \
            --data '{}')

          if [ "$runtime_version" != '"20260717090000"' ]; then
            echo "Notification runtime migration is missing or has the wrong version."
            exit 1
          fi

          ai_runtime_version=$(curl --silent --show-error --fail \
            "https://${SUPABASE_PROJECT_ID}.supabase.co/rest/v1/rpc/ai_security_runtime_version" \
            -X POST \
            "${auth_headers[@]}" \
            -H "Content-Type: application/json" \
            --data '{}')

          if [ "$ai_runtime_version" != '"20260717131000"' ]; then
            echo "AI consent and budget migration is missing or has the wrong version."
            exit 1
          fi

          sporthub_runtime_version=$(curl --silent --show-error --fail \
            "https://${SUPABASE_PROJECT_ID}.supabase.co/rest/v1/rpc/sporthub_security_runtime_version" \
            -X POST \
            "${auth_headers[@]}" \
            -H "Content-Type: application/json" \
            --data '{}')

          if [ "$sporthub_runtime_version" != '"20260717138000"' ]; then
            echo "SportHub webhook and credential migration is missing or has the wrong version."
            exit 1
          fi

          security_alert_runtime_version=$(curl --silent --show-error --fail \
            "https://${SUPABASE_PROJECT_ID}.supabase.co/rest/v1/rpc/security_alert_runtime_version" \
            -X POST \
            "${auth_headers[@]}" \
            -H "Content-Type: application/json" \
            --data '{}')

          if [ "$security_alert_runtime_version" != '"20260717140000"' ]; then
            echo "Security alert outbox migration is missing or has the wrong version."
            exit 1
          fi

          security_release_runtime_version=$(curl --silent --show-error --fail \
            "https://${SUPABASE_PROJECT_ID}.supabase.co/rest/v1/rpc/security_release_runtime_version" \
            -X POST \
            "${auth_headers[@]}" \
            -H "Content-Type: application/json" \
            --data '{}')

          if [ "$security_release_runtime_version" != '"20260717143000"' ]; then
            echo "The complete security release baseline is missing or has the wrong version."
            exit 1
          fi

      - name: Deploy Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          ENVIRONMENT: ${{ github.event.inputs.environment || 'staging' }}
        run: |
          for dir in supabase/functions/*/; do
            function_name=$(basename "$dir")
            if [[ "$function_name" == _* ]]; then
              echo "Skipping shared directory $function_name"
              continue
            fi
            echo "Deploying $function_name..."
            supabase functions deploy "$function_name" \
              --project-ref "$SUPABASE_PROJECT_ID"
          done

      - name: Summary
        run: |
          echo "## Deployed Successfully" >> $GITHUB_STEP_SUMMARY
          echo "- Environment: ${{ github.event.inputs.environment || 'staging' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY

  invoke-notification-workers:
    if: github.event_name == 'schedule'
    name: Invoke production notification workers
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    env:
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - name: Process WhatsApp outbox
        if: github.event.schedule == '*/5 * * * *'
        env:
          WORKER_SECRET: ${{ secrets.WHATSAPP_PROCESSOR_CRON_SECRET }}
        run: |
          test -n "$SUPABASE_PROJECT_ID"
          test -n "$WORKER_SECRET"
          curl --silent --show-error --fail \
            "https://${SUPABASE_PROJECT_ID}.supabase.co/functions/v1/process-whatsapp-notifications" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "x-internal-secret: ${WORKER_SECRET}" \
            --data '{"limit":3}' >/dev/null

      - name: Process post-expiry subscription recovery
        if: github.event.schedule == '17 * * * *'
        env:
          WORKER_SECRET: ${{ secrets.SUBSCRIPTION_RECOVERY_CRON_SECRET }}
        run: |
          test -n "$SUPABASE_PROJECT_ID"
          test -n "$WORKER_SECRET"
          curl --silent --show-error --fail \
            "https://${SUPABASE_PROJECT_ID}.supabase.co/functions/v1/subscription-recovery-cron" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "x-internal-secret: ${WORKER_SECRET}" \
            --data '{"limit":2}' >/dev/null

      - name: Clean up expired rollover credits
        if: github.event.schedule == '23 2 * * *'
        env:
          WORKER_SECRET: ${{ secrets.ROLLOVER_CLEANUP_CRON_SECRET }}
        run: |
          test -n "$SUPABASE_PROJECT_ID"
          test -n "$WORKER_SECRET"
          curl --silent --show-error --fail \
            "https://${SUPABASE_PROJECT_ID}.supabase.co/functions/v1/cleanup-expired-rollovers" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "x-internal-secret: ${WORKER_SECRET}" \
            --data '{"limit":5}' >/dev/null

      - name: Process subscription lifecycle
        if: github.event.schedule == '31 * * * *'
        env:
          WORKER_SECRET: ${{ secrets.SUBSCRIPTION_RENEWAL_CRON_SECRET }}
        run: |
          test -n "$SUPABASE_PROJECT_ID"
          test -n "$WORKER_SECRET"
          curl --silent --show-error --fail \
            "https://${SUPABASE_PROJECT_ID}.supabase.co/functions/v1/process-subscription-renewal" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "x-internal-secret: ${WORKER_SECRET}" \
            --data '{"dry_run":false}' >/dev/null

      - name: Calculate weekly health scores
        if: github.event.schedule == '13 3 * * 0'
        env:
          WORKER_SECRET: ${{ secrets.HEALTH_SCORE_CRON_SECRET }}
        run: |
          test -n "$SUPABASE_PROJECT_ID"
          test -n "$WORKER_SECRET"
          cursor=""
          while true; do
            body='{"limit":3}'
            if [ -n "$cursor" ] && [ "$cursor" != "null" ]; then
              body="{\"limit\":3,\"after_user_id\":\"${cursor}\"}"
            fi

            response=$(curl --silent --show-error --fail \
              "https://${SUPABASE_PROJECT_ID}.supabase.co/functions/v1/calculate-health-score" \
              -X POST \
              -H "Content-Type: application/json" \
              -H "x-internal-secret: ${WORKER_SECRET}" \
              --data "$body")

            cursor=$(printf '%s' "$response" | node -e "let data=''; process.stdin.on('data', c => data += c); process.stdin.on('end', () => console.log(JSON.parse(data).next_cursor || ''));")
            if [ -z "$cursor" ]; then
              break
            fi
          done
