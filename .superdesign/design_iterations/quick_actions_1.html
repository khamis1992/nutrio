<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Actions - Variation 1</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-6">
    <div class="max-w-md mx-auto">
        <h2 class="text-base font-semibold text-black mb-1">Quick Actions</h2>
        <p class="text-xs text-gray-500 mb-4">Jump back into the parts of your plan that need attention</p>
        
        <div class="space-y-3">
            <!-- Update Goals -->
            <button class="w-full flex items-center gap-4 bg-white rounded-xl p-4 shadow-sm hover:shadow-md transition-all text-left group">
                <div class="w-12 h-12 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center shrink-0">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2" fill="currentColor"/></svg>
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-semibold text-black">Update Goals</p>
                    <p class="text-xs text-gray-500 truncate">Changed your fitness goals? Refresh your daily targets.</p>
                </div>
                <svg class="w-5 h-5 text-gray-400 group-hover:text-black transition-colors" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
            </button>
            
            <!-- View Meal Plan -->
            <button class="w-full flex items-center gap-4 bg-white rounded-xl p-4 shadow-sm hover:shadow-md transition-all text-left group">
                <div class="w-12 h-12 rounded-full bg-sky-100 text-sky-600 flex items-center justify-center shrink-0">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2v20M2 12h20"/></svg>
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-semibold text-black">View Meal Plan</p>
                    <p class="text-xs text-gray-500 truncate">See your AI-curated weekly menu at a glance.</p>
                </div>
                <svg class="w-5 h-5 text-gray-400 group-hover:text-black transition-colors" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
            </button>
            
            <!-- Log Weight -->
            <button class="w-full flex items-center gap-4 bg-white rounded-xl p-4 shadow-sm hover:shadow-md transition-all text-left group">
                <div class="w-12 h-12 rounded-full bg-amber-100 text-amber-600 flex items-center justify-center shrink-0">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="4" y="6" width="16" height="10" rx="2"/><path d="M8 20h8"/></svg>
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-semibold text-black">Log Weight</p>
                    <p class="text-xs text-gray-500 truncate">Track weigh-ins to see real progress over time.</p>
                </div>
                <svg class="w-5 h-5 text-gray-400 group-hover:text-black transition-colors" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
            </button>
        </div>
    </div>
</body>
</html>
