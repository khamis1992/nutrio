<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Actions - Variation 3</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-6">
    <div class="max-w-md mx-auto">
        <div class="flex items-center justify-between mb-4">
            <h2 class="text-base font-semibold text-black">Quick Actions</h2>
            <button class="text-xs font-medium text-gray-500 hover:text-black transition-colors">View all</button>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
            <!-- Update Goals -->
            <button class="bg-white rounded-2xl p-4 shadow-sm hover:shadow-md hover:-translate-y-0.5 transition-all text-left group">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-emerald-400 to-emerald-600 text-white flex items-center justify-center mb-3 shadow-md shadow-emerald-200">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="10"/>
                        <circle cx="12" cy="12" r="6"/>
                        <circle cx="12" cy="12" r="2" fill="currentColor"/>
                    </svg>
                </div>
                <p class="text-sm font-bold text-black">Update Goals</p>
                <p class="text-xs text-gray-500 mt-1 leading-relaxed">Refresh your daily targets.</p>
                <div class="mt-3 flex items-center text-xs font-semibold text-emerald-600">
                    Edit Profile
                    <svg class="w-4 h-4 ml-1 group-hover:translate-x-0.5 transition-transform" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </div>
            </button>

            <!-- View Meal Plan -->
            <button class="bg-white rounded-2xl p-4 shadow-sm hover:shadow-md hover:-translate-y-0.5 transition-all text-left group">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-sky-400 to-blue-600 text-white flex items-center justify-center mb-3 shadow-md shadow-sky-200">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M12 2v20M2 12h20"/>
                    </svg>
                </div>
                <p class="text-sm font-bold text-black">View Meal Plan</p>
                <p class="text-xs text-gray-500 mt-1 leading-relaxed">Open your AI-curated menu.</p>
                <div class="mt-3 flex items-center text-xs font-semibold text-blue-600">
                    Open Planner
                    <svg class="w-4 h-4 ml-1 group-hover:translate-x-0.5 transition-transform" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </div>
            </button>

            <!-- Log Weight -->
            <button class="bg-white rounded-2xl p-4 shadow-sm hover:shadow-md hover:-translate-y-0.5 transition-all text-left group">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-amber-400 to-orange-500 text-white flex items-center justify-center mb-3 shadow-md shadow-amber-200">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <rect x="4" y="6" width="16" height="10" rx="2"/>
                        <path d="M8 20h8"/>
                    </svg>
                </div>
                <p class="text-sm font-bold text-black">Log Weight</p>
                <p class="text-xs text-gray-500 mt-1 leading-relaxed">Track weigh-ins daily.</p>
                <div class="mt-3 flex items-center text-xs font-semibold text-orange-600">
                    Add Entry
                    <svg class="w-4 h-4 ml-1 group-hover:translate-x-0.5 transition-transform" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </div>
            </button>
        </div>
    </div>
</body>
</html>
