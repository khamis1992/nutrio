<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1080">
    <title>Instagram Post - POV: You ordered healthy food</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Open+Sans:wght@400;500;600&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 1080px;
            height: 1080px;
            font-family: 'Open Sans', sans-serif;
            background: linear-gradient(135deg, #0D7377 0%, #14919B 50%, #FF6B6B 100%);
            position: relative;
            overflow: hidden;
        }
        .decorative {
            position: absolute;
            border-radius: 50%;
            opacity: 0.15;
        }
        .decorative-1 {
            width: 400px;
            height: 400px;
            background: white;
            top: -100px;
            right: -100px;
        }
        .decorative-2 {
            width: 300px;
            height: 300px;
            background: white;
            bottom: -80px;
            left: -80px;
        }
        .decorative-3 {
            width: 150px;
            height: 150px;
            background: #F4D03F;
            top: 200px;
            left: 100px;
        }
        .content {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px;
            text-align: center;
        }
        .reel-badge {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: white;
            padding: 12px 30px;
            border-radius: 30px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 18px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .emojis {
            font-size: 140px;
            margin-bottom: 30px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        h1 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 64px;
            color: white;
            margin-bottom: 16px;
            letter-spacing: -1px;
            text-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .subtitle {
            font-family: 'Open Sans', sans-serif;
            font-size: 32px;
            color: rgba(255,255,255,0.95);
            margin-bottom: 50px;
            font-weight: 500;
            text-shadow: 0 2px 10px rgba(0,0,0,0.15);
        }
        .food-card {
            background: rgba(255,255,255,0.95);
            border-radius: 30px;
            padding: 30px 50px;
            display: flex;
            align-items: center;
            gap: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            margin-bottom: 40px;
        }
        .food-emoji {
            font-size: 60px;
        }
        .food-info {
            text-align: left;
        }
        .food-name {
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 22px;
            color: #0D7377;
        }
        .food-desc {
            font-family: 'Open Sans', sans-serif;
            font-size: 16px;
            color: #666;
        }
        .cta {
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 26px;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.2);
            padding: 16px 40px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
        }
        .cta-hand {
            font-size: 30px;
        }
    </style>
</head>
<body>
    <div class="decorative decorative-1"></div>
    <div class="decorative decorative-2"></div>
    <div class="decorative decorative-3"></div>
    
    <div class="content">
        <div class="reel-badge">
            <span>▶</span> REEL
        </div>
        
        <div class="emojis">🥗😋</div>
        
        <h1>POV: You ordered healthy food</h1>
        <p class="subtitle">And it's actually delicious</p>
        
        <div class="food-card">
            <div class="food-emoji">🍲</div>
            <div class="food-info">
                <div class="food-name">Power Bowl</div>
                <div class="food-desc">Quinoa, chickpeas, roasted veggies, tahini</div>
            </div>
        </div>
        
        <div class="cta">
            <span class="cta-hand">📲</span> Download @nutriofuel.qatar
        </div>
    </div>
</body>
</html>
