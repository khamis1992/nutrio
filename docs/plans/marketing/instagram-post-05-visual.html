<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1080">
    <title>Instagram Post - Success Story</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Open+Sans:wght@400;500;600&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 1080px;
            height: 1080px;
            font-family: 'Open Sans', sans-serif;
            background: linear-gradient(145deg, #FEFCF8 0%, #FFF5F5 50%, #FFF9F0 100%);
            position: relative;
            overflow: hidden;
        }
        .coral-accent {
            position: absolute;
            top: 0;
            right: 0;
            width: 55%;
            height: 100%;
            background: linear-gradient(180deg, #FF6B6B 0%, #FF8E8E 100%);
            opacity: 0.12;
            border-radius: 0 0 0 60%;
        }
        .decorative {
            position: absolute;
            opacity: 0.15;
        }
        .heart-1 {
            font-size: 60px;
            top: 80px;
            right: 150px;
            color: #FF6B6B;
        }
        .heart-2 {
            font-size: 40px;
            bottom: 200px;
            right: 80px;
            color: #FF6B6B;
        }
        .star {
            font-size: 50px;
            top: 250px;
            left: 100px;
            color: #F4D03F;
        }
        .content {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 50px;
            text-align: center;
        }
        .badge {
            background: linear-gradient(135deg, #FF6B6B 0%, #FF8E8E 100%);
            color: white;
            padding: 10px 30px;
            border-radius: 30px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 18px;
            margin-bottom: 25px;
        }
        h1 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 56px;
            color: #0D7377;
            margin-bottom: 35px;
            letter-spacing: -1px;
        }
        .quote-card {
            background: white;
            border-radius: 30px;
            padding: 35px 45px;
            margin-bottom: 30px;
            box-shadow: 0 15px 50px rgba(255, 107, 107, 0.15);
            position: relative;
        }
        .quote-mark {
            position: absolute;
            top: -15px;
            left: 30px;
            font-size: 60px;
            color: #FF6B6B;
            opacity: 0.3;
            font-family: Georgia, serif;
        }
        .quote {
            font-family: 'Open Sans', sans-serif;
            font-size: 24px;
            color: #333;
            font-style: italic;
            line-height: 1.5;
            font-weight: 500;
        }
        .author {
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 22px;
            color: #0D7377;
            margin-top: 20px;
        }
        .results {
            display: flex;
            gap: 20px;
            margin-bottom: 35px;
        }
        .result {
            background: white;
            border-radius: 15px;
            padding: 15px 25px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }
        .result-icon {
            font-size: 24px;
        }
        .result-text {
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 18px;
            color: #333;
        }
        .cta {
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 24px;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #FF6B6B 0%, #FF8E8E 100%);
            padding: 18px 45px;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.35);
        }
    </style>
</head>
<body>
    <div class="coral-accent"></div>
    <div class="decorative heart-1">❤️</div>
    <div class="decorative heart-2">❤️</div>
    <div class="decorative star">⭐</div>
    
    <div class="content">
        <div class="badge">✨ Success Story</div>
        
        <h1>Sarah, 32, Doha</h1>
        
        <div class="quote-card">
            <div class="quote-mark">"</div>
            <p class="quote">I finally feel in control of my health. And the best part? The food is actually delicious!</p>
            <div class="author">— Sarah</div>
        </div>
        
        <div class="results">
            <div class="result">
                <span class="result-icon">⚖️</span>
                <span class="result-text">-8kg</span>
            </div>
            <div class="result">
                <span class="result-icon">⚡</span>
                <span class="result-text">More energy</span>
            </div>
            <div class="result">
                <span class="result-icon">😴</span>
                <span class="result-text">Better sleep</span>
            </div>
        </div>
        
        <div class="cta">
            Start your story → Link in bio
        </div>
    </div>
</body>
</html>
