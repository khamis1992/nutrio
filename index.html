<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Enhanced viewport configuration for mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <!-- App name -->
    <title>Nutrio - Healthy Meal Delivery & Nutrition Tracking</title>
    <meta name="description" content="Order healthy meals, track your nutrition, and reach your fitness goals with Nutrio." />
    <meta name="author" content="Nutrio" />

    <!-- Theme color for mobile browsers -->
    <meta name="theme-color" content="#020617" />
    <meta name="msapplication-TileColor" content="#020617" />

    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="Nutrio - Healthy Meal Delivery" />
    <meta property="og:description" content="Order healthy meals, track your nutrition, and reach your fitness goals with Nutrio." />
    <meta property="og:type" content="website" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- Google Fonts. Avoid inline onload handlers so the web deployment can
         enforce a strict script-src policy. System fonts remain the fallback. -->
    <!-- Performance: preconnect to critical origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://api.posthog.com" />
    <link rel="dns-prefetch" href="https://api.posthog.com" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap"
    />
    <!-- Leaflet Map CSS is imported via npm in components that use maps -->
    <!-- Removed CDN link to prevent blocking on devices with no/slow internet -->

    <!-- Content Security Policy: restrict resource loading to trusted sources.
         'self' covers https://localhost (Capacitor Android androidScheme:https)
         and capacitor:// (Capacitor iOS) so no extra origin is needed for
         local assets.  The connect-src additions allow Supabase realtime and
         analytics from the mobile app.
         IMPORTANT: blob: is added to connect-src for Supabase realtime websocket
         connections. data: is added to worker-src for inline workers used by
         some polyfills. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' capacitor: https://localhost; script-src 'self' 'unsafe-inline' 'unsafe-eval' capacitor: https://localhost blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com capacitor: https://localhost; font-src 'self' data: https://fonts.gstatic.com capacitor: https://localhost; connect-src 'self' capacitor: https://localhost https://*.supabase.co wss://*.supabase.co https://*.posthog.com https://api.posthog.com https://us.i.posthog.com https://*.sentry.io https://api.mapbox.com https://events.mapbox.com; img-src 'self' data: blob: capacitor: https://localhost https://*.supabase.co https://ui-avatars.com https://images.unsplash.com https://api.mapbox.com https://*.mapbox.com; media-src 'self' capacitor: https://localhost blob: https://assets.mixkit.co; worker-src 'self' blob:; frame-src 'none'; base-uri 'self'; form-action 'self';" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
