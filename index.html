<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Enhanced viewport configuration for mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <!-- App name -->
    <title>Nutrio - Healthy Meal Delivery & Nutrition Tracking</title>
    <meta name="description" content="Order healthy meals, track your nutrition, and reach your fitness goals with Nutrio." />
    <meta name="author" content="Nutrio" />

    <!-- Theme color for mobile browsers -->
    <meta name="theme-color" content="#22c55e" />
    <meta name="msapplication-TileColor" content="#22c55e" />

    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="Nutrio - Healthy Meal Delivery" />
    <meta property="og:description" content="Order healthy meals, track your nutrition, and reach your fitness goals with Nutrio." />
    <meta property="og:type" content="website" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- Google Fonts: loaded non-blocking using the print/onload trick.
         CSS @import is render-blocking on Android WebView, so we use <link>
         with media="print" and switch to "all" once loaded. This way the
         app renders immediately with system fonts and upgrades to Plus Jakarta
         Sans once the font is available (or never, if offline). -->
    <!-- Performance: preconnect to critical origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://api.posthog.com" />
    <link rel="dns-prefetch" href="https://api.posthog.com" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" />
    </noscript>
    <!-- Leaflet Map CSS is imported via npm in components that use maps -->
    <!-- Removed CDN link to prevent blocking on devices with no/slow internet -->

    <!-- Content Security Policy: restrict resource loading to trusted sources.
         'self' covers https://localhost (Capacitor Android androidScheme:https)
         and capacitor:// (Capacitor iOS) so no extra origin is needed for
         local assets.  The connect-src additions allow Supabase realtime and
         analytics from the mobile app.
         IMPORTANT: blob: is added to connect-src for Supabase realtime websocket
         connections. data: is added to worker-src for inline workers used by
         some polyfills. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' capacitor: https://localhost; script-src 'self' 'unsafe-inline' 'unsafe-eval' capacitor: https://localhost blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com capacitor: https://localhost; font-src 'self' data: https://fonts.gstatic.com capacitor: https://localhost; connect-src 'self' capacitor: https://localhost https://*.supabase.co wss://*.supabase.co https://*.posthog.com https://api.posthog.com https://us.i.posthog.com https://*.sentry.io https://api.mapbox.com https://events.mapbox.com; img-src 'self' data: blob: capacitor: https://localhost https://*.supabase.co https://ui-avatars.com https://images.unsplash.com https://api.mapbox.com https://*.mapbox.com; media-src 'self' capacitor: https://localhost blob:; worker-src 'self' blob:; frame-src 'none'; base-uri 'self'; form-action 'self';" />
  </head>

  <body>
    <div id="root"></div>
    <!-- Diagnostic overlay: catches ALL JS errors before/during React mount.
         If the APK shows a white page, this will display the exact error.
         Remove this block once the root cause is confirmed fixed. -->
    <script>
      (function() {
        var el = document.createElement('div');
        el.id = '__nutrio_diag';
        el.style.cssText = 'display:none;position:fixed;inset:0;z-index:99999;background:#0a0a0a;color:#e0e0e0;font:13px/1.6 monospace;padding:16px;overflow:auto;white-space:pre-wrap;word-break:break-all';
        document.body.appendChild(el);
        var msgs = [];
        function show() {
          el.style.display = 'block';
          // Header with green status bar if no errors yet
          el.innerHTML = '<div style="background:#166534;color:#4ade80;padding:8px 12px;margin:-16px -16px 12px -16px;font-weight:bold;font-size:14px">Nutrio Debug Panel — App Loaded</div>'
            + msgs.join('\n');
        }
        function add(prefix, text) {
          var ts = new Date().toISOString().slice(11,23);
          msgs.push('[' + ts + '] ' + prefix + ': ' + String(text).slice(0,2000));
          show();
        }
        window.addEventListener('error', function(e) { add('UNCAUGHT', (e.error && e.error.stack) || e.message || e.filename + ':' + e.lineno); }, true);
        window.addEventListener('unhandledrejection', function(e) { add('PROMISE', (e.reason && e.reason.stack) || e.reason); });
        var _w = console.warn, _e = console.error;
        console.warn = function() { _w.apply(console,arguments); add('WARN', Array.prototype.join.call(arguments,' ')); };
        console.error = function() { _e.apply(console,arguments); add('ERROR', Array.prototype.join.call(arguments,' ')); };
        add('INFO', 'URL=' + location.href + ' UA=' + navigator.userAgent.slice(0,100));
        // After 5s, check whether React rendered into #root
        setTimeout(function() {
          var root = document.getElementById('root');
          var hasKids = root && root.children.length > 0;
          var hasText = root && root.textContent && root.textContent.trim().length > 0;
          var innerHTML = root ? root.innerHTML.slice(0, 500) : '(root not found)';
          add('DOM_CHECK', 'rootHasChildren=' + hasKids + ' rootHasText=' + hasText + ' innerHTML=' + innerHTML);
        }, 5000);
        // After 15s, check again
        setTimeout(function() {
          var root = document.getElementById('root');
          var hasKids = root && root.children.length > 0;
          var innerHTML = root ? root.innerHTML.slice(0, 1000) : '(not found)';
          add('DOM_CHECK_15s', 'rootHasChildren=' + hasKids + ' innerHTML=' + innerHTML);
        }, 15000);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
