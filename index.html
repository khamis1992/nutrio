<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Enhanced viewport configuration for mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <!-- App name -->
    <title>Nutrio - Healthy Meal Delivery & Nutrition Tracking</title>
    <meta name="description" content="Order healthy meals, track your nutrition, and reach your fitness goals with Nutrio." />
    <meta name="author" content="Nutrio" />

    <!-- Theme color for mobile browsers -->
    <meta name="theme-color" content="#22c55e" />
    <meta name="msapplication-TileColor" content="#22c55e" />

    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="Nutrio - Healthy Meal Delivery" />
    <meta property="og:description" content="Order healthy meals, track your nutrition, and reach your fitness goals with Nutrio." />
    <meta property="og:type" content="website" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- Google Fonts: loaded non-blocking using the print/onload trick.
         CSS @import is render-blocking on Android WebView, so we use <link>
         with media="print" and switch to "all" once loaded. This way the
         app renders immediately with system fonts and upgrades to Plus Jakarta
         Sans once the font is available (or never, if offline). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" />
    </noscript>
    <!-- Leaflet Map CSS is imported via npm in components that use maps -->
    <!-- Removed CDN link to prevent blocking on devices with no/slow internet -->
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
